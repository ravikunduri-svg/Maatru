<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Navya — Partner View</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { margin: 0; background: #faf9f5; }
  </style>
</head>
<body>

<!-- Ambient glow -->
<div aria-hidden="true" style="position:fixed;bottom:12%;right:-6rem;width:24rem;height:24rem;background:rgba(255,218,212,.1);border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;"></div>

<!-- TOP BAR -->
<header class="nav-top" role="banner">
  <div class="nav-top-logo">
    <div class="nav-top-logo-icon" style="background:var(--secondary-container);color:var(--secondary);">
      <span class="material-symbols-outlined">group</span>
    </div>
    <div>
      <div class="nav-top-app-name" style="font-size:.9375rem;" id="partner-top-name">Partner View</div>
      <div class="nav-top-sub">Navya · Read-only access</div>
    </div>
  </div>
  <a href="index.html" style="font-size:.75rem;color:var(--primary);font-weight:700;text-decoration:none;display:flex;align-items:center;gap:.2rem;">
    <span class="material-symbols-outlined" style="font-size:.875rem;">arrow_back</span>Navya
  </a>
</header>

<!-- MAIN CONTENT — partner.js owns everything inside #partner-root -->
<main id="partner-root" class="partner-root" aria-live="polite" role="main">
  <!-- Loading placeholder -->
  <div style="display:flex;align-items:center;justify-content:center;height:60vh;">
    <span class="material-symbols-outlined" style="font-size:2.5rem;color:var(--primary-container);">spa</span>
  </div>
</main>

<!-- BOTTOM NAV — 2 tabs for partner -->
<nav class="nav-bottom" aria-label="Partner navigation">
  <div class="nav-bottom-row">
    <button class="nb-btn active" id="pnb-today" onclick="pNavigate('today')">
      <span class="material-symbols-outlined">today</span>
      <span class="nb-label">Today</span>
    </button>
    <button class="nb-btn" id="pnb-history" onclick="pNavigate('history')">
      <span class="material-symbols-outlined">history</span>
      <span class="nb-label">History</span>
    </button>
    <button class="nb-btn" id="pnb-note" onclick="pNavigate('note')">
      <span class="material-symbols-outlined">edit_note</span>
      <span class="nb-label">My note</span>
    </button>
  </div>
</nav>

<!-- Notification toast -->
<div class="notif-toast" id="p-notif-toast" role="alert">
  <span class="material-symbols-outlined">check_circle</span>
  <span id="p-notif-body"></span>
</div>

<script src="partner.js"></script>
</body>
</html>
