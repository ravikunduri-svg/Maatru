<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#faf9f5" />
  <title>Navya — Postpartum Care</title>
  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Critical inline: prevent flash of unstyled content */
    body { margin: 0; background: #faf9f5; }
    #app-root { min-height: calc(100dvh - 144px); }
  </style>
</head>
<body>

<!-- Ambient glows (decorative, pointer-events-none) -->
<div aria-hidden="true" style="position:fixed;top:15%;left:-6rem;width:20rem;height:20rem;background:rgba(198,237,191,.12);border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;"></div>
<div aria-hidden="true" style="position:fixed;bottom:12%;right:-6rem;width:24rem;height:24rem;background:rgba(255,218,212,.08);border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;"></div>

<!-- TOP APP BAR -->
<header class="nav-top" role="banner">
  <div class="nav-top-logo">
    <div class="nav-top-logo-icon">
      <span class="material-symbols-outlined">spa</span>
    </div>
    <div>
      <div class="nav-top-app-name">Navya</div>
      <div class="nav-top-sub">Postpartum care</div>
    </div>
  </div>
  <div id="top-bar-right">
    <!-- app.js injects: day badge or avatar -->
  </div>
</header>

<!-- MAIN CONTENT — app.js owns everything inside #app-root -->
<main id="app-root" aria-live="polite" role="main">
  <!-- Loading placeholder, replaced immediately by app.js -->
  <div style="display:flex;align-items:center;justify-content:center;height:60vh;">
    <span class="material-symbols-outlined" style="font-size:2.5rem;color:var(--primary-container);animation:spin 1s linear infinite;">refresh</span>
  </div>
</main>

<!-- BOTTOM NAV — 5 tabs -->
<nav class="nav-bottom" aria-label="Main navigation">
  <div class="nav-bottom-row">
    <button class="nb-btn" id="nb-home" onclick="navigate('#home')" aria-label="Home">
      <span class="material-symbols-outlined">home</span>
      <span class="nb-label">Home</span>
    </button>
    <button class="nb-btn" id="nb-checkin" onclick="navigate('#checkin')" aria-label="Daily check-in">
      <span class="material-symbols-outlined">health_metrics</span>
      <span class="nb-label">Check-in</span>
    </button>
    <button class="nb-btn" id="nb-symptoms" onclick="navigate('#symptoms')" aria-label="Breastfeeding guide">
      <span class="material-symbols-outlined">favorite</span>
      <span class="nb-label">Guide</span>
    </button>
    <button class="nb-btn" id="nb-meal" onclick="navigate('#meal-plan')" aria-label="Meal plan">
      <span class="material-symbols-outlined">restaurant_menu</span>
      <span class="nb-label">Meals</span>
    </button>
    <button class="nb-btn" id="nb-settings" onclick="navigate('#settings')" aria-label="Settings">
      <span class="material-symbols-outlined">tune</span>
      <span class="nb-label">Settings</span>
    </button>
  </div>
</nav>

<!-- NOTIFICATION TOAST (shown via NotifManager.showToast) -->
<div class="notif-toast" id="notif-toast" role="alert" aria-live="assertive">
  <span class="material-symbols-outlined">notifications</span>
  <span id="notif-toast-body"></span>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="app.js"></script>

<script>
// Service Worker registration
// Works on HTTPS and localhost only — silently skips file:// protocol
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => { window._swReg = reg; })
      .catch(() => { window._swReg = null; }); // degrade gracefully on file://
  });
}
</script>

</body>
</html>
